body:
  text: 庚子午為子午圈庚午為地平乙巳為黃道甲卯為赤道庚子為北極出地平四十二度高戊為天頂丙為黃道九十度限丙戊為本限距天頂弧丙丁為限出地平高弧乙丙為限距正午弧戊乙丙角為黃道與子午圈相交角乙為黃道在天中度甲乙弧為中度赤道南之緯弧戊乙為中度距天頂弧諸弧彼此相交則成曲線三角形為戊乙丙者因三角形之理而立九十度表法其三角形內全備者有三其一中度距天頂乙戊弧其二戊乙丙角其三戊丙乙角恆為直角者立表法之要亦有三其一求戊丙弧即九十度限距天頂若干度分法曰戊乙弦之正弦數與戊乙丙角之正弦數相乘其總數以戊丙乙直角之正弦數除之所得之數即戊丙弧正弧之數也其二求乙丙弧即九十度限距正午若干度分法曰戊乙丙角之餘弦數與戊乙弧之切弦數相乘其總數以戊丙乙直角之正弦數除之所得之數即乙丙弧之正切弦數以各弦之數查八線表即得其相應之度分也
