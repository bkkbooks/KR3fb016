body:
  text: 黃道九十度表圖説黃道九十度限者即黃道出地平東西各九十度之中限也凡推日食以此為最要其理論詳在交食曆指等書然多理之論亦或可簡略干目前一面之圖如所見渾天之廣大簡略于一目之小然庶可因圖而推立法之原由矣故照盛京北極出地約四十二度之高並依其地脈正南向指南針天下萬國多有偏向或車或西惟盛京正指南向而不偏繪渾天儀象如左
  hash: sha256:de896d0d517d6e7ba58ebed709edd51e3c6db3ea8fa1de8af9aa4fbe87a347af
