body:
  text: 庚子午爲子午圈庚午爲地平乙巳爲黃道甲卯爲赤道庚子爲北極出地平四十二度高戊爲天頂丙爲黃道九十度限丙戊爲本限距天頂弧丙丁爲限出地平高弧乙丙爲限距正午弧戊乙丙角爲黃道與子午圈相交角乙爲黃道在天中度甲乙弧爲中度赤道南之緯弧戊乙爲中度距天頂弧諸弧彼此相交則成曲線三角形爲戊乙丙者因三角形之理而立九十度表法其三角形內全備者有三其一中度距天頂乙戊弧其二戊乙丙角其三戊丙乙角恒爲直角者立表法之要亦有三其一求戊丙弧卽九十度限距天頂若干度分法曰戊乙弦之正弦數與戊乙丙角之正弦數相乘其總數以戊丙乙直角之正弦數除之所得之數卽戊丙弧正弧之數也其二求乙丙弧卽九十度限距正午若干度分法曰戊乙丙角之餘弦數與戊乙弧之切弦數相乘其總數以戊丙乙直角之正弦數除之所得之數卽乙丙弧之正切弦數以各弦之數查八線表卽得其相應之度分也
